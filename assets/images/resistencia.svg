<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" fill="#111"/>
  <text x="260" y="28" fill="#fff" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Resistencia electrica</text>

  <!-- Componente fisico -->
  <text x="130" y="52" fill="#888" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Componente fisico</text>
  <rect x="30" y="68" width="200" height="28" rx="14" fill="#d4c4a8" stroke="#888" stroke-width="1"/>
  <rect x="55" y="72" width="18" height="20" fill="#8B4513"/>
  <rect x="78" y="72" width="18" height="20" fill="#000"/>
  <rect x="101" y="72" width="18" height="20" fill="#FFD700"/>
  <rect x="124" y="72" width="18" height="20" fill="#FFD700"/>
  <rect x="147" y="72" width="18" height="20" fill="#8B4513"/>
  <line x1="10" y1="82" x2="30" y2="82" stroke="#aaa" stroke-width="2"/>
  <line x1="230" y1="82" x2="250" y2="82" stroke="#aaa" stroke-width="2"/>
  <text x="130" y="115" fill="#aaa" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Bandas de color = valor en ohmios</text>

  <!-- Simbolo esquematico IEC -->
  <text x="390" y="52" fill="#888" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Simbolo en circuito (IEC)</text>
  <line x1="300" y1="82" x2="330" y2="82" stroke="#990000" stroke-width="2"/>
  <rect x="330" y="72" width="120" height="20" rx="2" fill="none" stroke="#990000" stroke-width="2.5"/>
  <text x="390" y="86" fill="#990000" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">R</text>
  <line x1="450" y1="82" x2="480" y2="82" stroke="#990000" stroke-width="2"/>

  <!-- Funcion -->
  <rect x="40" y="140" width="440" height="200" rx="12" fill="#1a1a1a" stroke="#333"/>
  <text x="260" y="168" fill="#990000" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Funcion: limita la corriente (Ley de Ohm)</text>
  <text x="260" y="200" fill="#ccc" font-family="Arial,sans-serif" font-size="22" text-anchor="middle">V = I x R</text>
  <line x1="80" y1="230" x2="160" y2="230" stroke="#555" stroke-width="2"/>
  <rect x="160" y="218" width="200" height="24" rx="4" fill="none" stroke="#990000" stroke-width="2"/>
  <text x="260" y="235" fill="#990000" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">Resistencia R</text>
  <line x1="360" y1="230" x2="440" y2="230" stroke="#555" stroke-width="2"/>
  <text x="120" y="225" fill="#63b3ff" font-family="Arial,sans-serif" font-size="10">I</text>
  <circle cx="80" cy="230" r="4" fill="#63b3ff"/>
  <circle cx="440" cy="230" r="4" fill="#63b3ff"/>
  <text x="260" y="280" fill="#888" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">A mayor R, menor corriente para el mismo voltaje</text>
  <text x="260" y="310" fill="#666" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">Unidad: Ohmio (ohm)  |  Simbolo: R</text>
</svg>
