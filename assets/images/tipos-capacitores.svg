<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400">
  <rect width="560" height="400" fill="#111"/>
  <text x="280" y="24" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Tipos de capacitores</text>

  <!-- Ceramico -->
  <rect x="20" y="40" width="250" height="160" rx="10" fill="#1a1a1a" stroke="#63b3ff" stroke-width="1.5"/>
  <text x="145" y="58" fill="#63b3ff" font-size="11" font-weight="bold" text-anchor="middle">Ceramico</text>
  <circle cx="145" cy="105" r="28" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <line x1="117" y1="105" x2="100" y2="105" stroke="#aaa" stroke-width="2"/>
  <line x1="173" y1="105" x2="190" y2="105" stroke="#aaa" stroke-width="2"/>
  <text x="145" y="155" fill="#aaa" font-size="9" text-anchor="middle">Disco pequeno, dos patas</text>
  <text x="145" y="172" fill="#666" font-size="8" text-anchor="middle">Capacitancias bajas (pF - nF)</text>
  <text x="145" y="189" fill="#555" font-size="8" text-anchor="middle">Estable, sin polaridad</text>

  <!-- Electrolitico -->
  <rect x="290" y="40" width="250" height="160" rx="10" fill="#1a1a1a" stroke="#63b3ff" stroke-width="1.5"/>
  <text x="415" y="58" fill="#63b3ff" font-size="11" font-weight="bold" text-anchor="middle">Electrolitico</text>
  <rect x="385" y="75" width="60" height="75" rx="4" fill="#1a1a2e" stroke="#555"/>
  <rect x="385" y="75" width="60" height="14" rx="2" fill="#888"/>
  <rect x="412" y="62" width="6" height="14" fill="#ccc"/>
  <rect x="385" y="100" width="10" height="45" fill="#fff" opacity="0.85"/>
  <text x="390" y="128" fill="#222" font-size="8">-</text>
  <text x="415" y="155" fill="#aaa" font-size="9" text-anchor="middle">Cilindro, polarizado (+/-)</text>
  <text x="415" y="172" fill="#666" font-size="8" text-anchor="middle">Capacitancias altas (uF - mF)</text>
  <text x="415" y="189" fill="#555" font-size="8" text-anchor="middle">Banda blanca = polo negativo</text>

  <!-- Poliester -->
  <rect x="20" y="215" width="250" height="165" rx="10" fill="#1a1a1a" stroke="#63b3ff" stroke-width="1.5"/>
  <text x="145" y="233" fill="#63b3ff" font-size="11" font-weight="bold" text-anchor="middle">Poliester (film)</text>
  <rect x="100" y="258" width="90" height="45" rx="4" fill="#c4a882" stroke="#888" stroke-width="1.5"/>
  <line x1="70" y1="280" x2="100" y2="280" stroke="#aaa" stroke-width="2"/>
  <line x1="190" y1="280" x2="220" y2="280" stroke="#aaa" stroke-width="2"/>
  <text x="145" y="330" fill="#aaa" font-size="9" text-anchor="middle">Caja rectangular plana</text>
  <text x="145" y="347" fill="#666" font-size="8" text-anchor="middle">Buena precision, sin polaridad</text>
  <text x="145" y="364" fill="#555" font-size="8" text-anchor="middle">Uso en filtros y acoplamiento</text>

  <!-- Tantalio -->
  <rect x="290" y="215" width="250" height="165" rx="10" fill="#1a1a1a" stroke="#63b3ff" stroke-width="1.5"/>
  <text x="415" y="233" fill="#63b3ff" font-size="11" font-weight="bold" text-anchor="middle">Tantalio</text>
  <path d="M395 310 L415 250 L435 310 Z" fill="#444" stroke="#888" stroke-width="1.5"/>
  <rect x="408" y="238" width="14" height="8" rx="1" fill="#888"/>
  <line x1="375" y1="285" x2="395" y2="285" stroke="#aaa" stroke-width="2"/>
  <line x1="435" y1="285" x2="455" y2="285" stroke="#aaa" stroke-width="2"/>
  <text x="415" y="330" fill="#aaa" font-size="9" text-anchor="middle">Forma de gota o chip</text>
  <text x="415" y="347" fill="#666" font-size="8" text-anchor="middle">Alta capacitancia en poco volumen</text>
  <text x="415" y="364" fill="#555" font-size="8" text-anchor="middle">Polarizado, sensible a inversion</text>
</svg>
