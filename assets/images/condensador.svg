<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" fill="#111"/>
  <text x="260" y="28" fill="#fff" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Capacitor</text>

  <!-- Fisico electrolitico -->
  <text x="130" y="52" fill="#888" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Componente fisico</text>
  <rect x="85" y="65" width="50" height="70" rx="4" fill="#222" stroke="#555" stroke-width="1.5"/>
  <rect x="85" y="65" width="50" height="12" rx="2" fill="#888"/>
  <rect x="108" y="55" width="4" height="12" fill="#aaa"/>
  <rect x="85" y="95" width="8" height="40" fill="#fff" opacity="0.9"/>
  <text x="110" y="118" fill="#fff" font-size="7" text-anchor="middle">-</text>
  <text x="130" y="148" fill="#aaa" font-size="9" text-anchor="middle">Electrolitico</text>
  <text x="130" y="162" fill="#666" font-size="8" text-anchor="middle">Banda = terminal negativo</text>

  <!-- Simbolo -->
  <text x="390" y="52" fill="#888" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Simbolo en circuito</text>
  <line x1="300" y1="100" x2="340" y2="100" stroke="#63b3ff" stroke-width="2"/>
  <line x1="340" y1="82" x2="340" y2="118" stroke="#63b3ff" stroke-width="3"/>
  <line x1="360" y1="82" x2="360" y2="118" stroke="#63b3ff" stroke-width="3"/>
  <path d="M360 82 Q380 100 360 118" fill="none" stroke="#63b3ff" stroke-width="2"/>
  <line x1="380" y1="100" x2="420" y2="100" stroke="#63b3ff" stroke-width="2"/>
  <text x="390" y="140" fill="#63b3ff" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">C (+ polarizado)</text>

  <!-- Funcion -->
  <rect x="40" y="185" width="440" height="155" rx="12" fill="#1a1a1a" stroke="#333"/>
  <text x="260" y="212" fill="#63b3ff" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Funcion: almacena carga electrica</text>
  <text x="260" y="242" fill="#ccc" font-family="Arial,sans-serif" font-size="18" text-anchor="middle">Q = C x V</text>
  <line x1="340" y1="82" x2="340" y2="118" stroke="#63b3ff" stroke-width="3"/>
  <!-- Mini circuito RC -->
  <line x1="100" y1="280" x2="140" y2="280" stroke="#555" stroke-width="2"/>
  <line x1="140" y1="265" x2="140" y2="295" stroke="#63b3ff" stroke-width="2"/>
  <line x1="155" y1="265" x2="155" y2="295" stroke="#63b3ff" stroke-width="2"/>
  <line x1="155" y1="280" x2="190" y2="280" stroke="#555" stroke-width="2"/>
  <rect x="190" y="272" width="50" height="16" rx="2" fill="none" stroke="#990000" stroke-width="2"/>
  <text x="215" y="284" fill="#990000" font-size="9" text-anchor="middle">R</text>
  <line x1="240" y1="280" x2="280" y2="280" stroke="#555" stroke-width="2"/>
  <text x="260" y="318" fill="#888" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">En circuitos RC: carga y descarga con constante tau = R x C</text>
  <text x="260" y="335" fill="#666" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">Unidad: Faradio (F)  |  Simbolo: C</text>
</svg>
