<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400">
  <rect width="560" height="400" fill="#111"/>
  <text x="280" y="24" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Tabla del codigo de colores (4 bandas)</text>

  <!-- Resistencia ejemplo -->
  <rect x="180" y="38" width="200" height="22" rx="11" fill="#c4b896" stroke="#666"/>
  <rect x="200" y="41" width="14" height="16" fill="#8B4513"/><text x="207" y="72" fill="#aaa" font-size="8" text-anchor="middle">1</text>
  <rect x="218" y="41" width="14" height="16" fill="#000"/><text x="225" y="72" fill="#aaa" font-size="8" text-anchor="middle">0</text>
  <rect x="236" y="41" width="14" height="16" fill="#FFD700"/><text x="243" y="72" fill="#aaa" font-size="8" text-anchor="middle">x10^4</text>
  <rect x="254" y="41" width="14" height="16" fill="#FFD700"/><text x="261" y="72" fill="#aaa" font-size="8" text-anchor="middle">5%</text>
  <text x="280" y="88" fill="#990000" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Ejemplo: marron-negro-amarillo-dorado = 100 kohm +/- 5%</text>

  <!-- Encabezados tabla -->
  <rect x="20" y="100" width="520" height="22" fill="#222" stroke="#444"/>
  <text x="70" y="115" fill="#ccc" font-size="10" font-weight="bold" text-anchor="middle">Color</text>
  <text x="180" y="115" fill="#ccc" font-size="10" font-weight="bold" text-anchor="middle">Digito</text>
  <text x="310" y="115" fill="#ccc" font-size="10" font-weight="bold" text-anchor="middle">Multiplicador</text>
  <text x="450" y="115" fill="#ccc" font-size="10" font-weight="bold" text-anchor="middle">Tolerancia</text>

  <!-- Filas -->
  <g font-family="Arial,sans-serif" font-size="9">
    <g transform="translate(0,122)">
      <rect x="20" y="0" width="520" height="18" fill="#1a1a1a" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#000" stroke="#555"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Negro</text><text x="180" y="12" fill="#fff" text-anchor="middle">0</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x1</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,140)">
      <rect x="20" y="0" width="520" height="18" fill="#151515" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#8B4513"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Marron</text><text x="180" y="12" fill="#fff" text-anchor="middle">1</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x10</text><text x="450" y="12" fill="#aaa" text-anchor="middle">+/- 1%</text>
    </g>
    <g transform="translate(0,158)">
      <rect x="20" y="0" width="520" height="18" fill="#1a1a1a" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#CC0000"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Rojo</text><text x="180" y="12" fill="#fff" text-anchor="middle">2</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x100</text><text x="450" y="12" fill="#aaa" text-anchor="middle">+/- 2%</text>
    </g>
    <g transform="translate(0,176)">
      <rect x="20" y="0" width="520" height="18" fill="#151515" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#FF6600"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Naranja</text><text x="180" y="12" fill="#fff" text-anchor="middle">3</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x1 000</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,194)">
      <rect x="20" y="0" width="520" height="18" fill="#1a1a1a" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#FFD700"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Amarillo</text><text x="180" y="12" fill="#fff" text-anchor="middle">4</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x10 000</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,212)">
      <rect x="20" y="0" width="520" height="18" fill="#151515" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#228B22"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Verde</text><text x="180" y="12" fill="#fff" text-anchor="middle">5</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x100 000</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,230)">
      <rect x="20" y="0" width="520" height="18" fill="#1a1a1a" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#0066CC"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Azul</text><text x="180" y="12" fill="#fff" text-anchor="middle">6</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x1 000 000</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,248)">
      <rect x="20" y="0" width="520" height="18" fill="#151515" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#7B2D8B"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Violeta</text><text x="180" y="12" fill="#fff" text-anchor="middle">7</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x10 000 000</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,266)">
      <rect x="20" y="0" width="520" height="18" fill="#1a1a1a" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#888"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Gris</text><text x="180" y="12" fill="#fff" text-anchor="middle">8</text><text x="310" y="12" fill="#666" text-anchor="middle">-</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,284)">
      <rect x="20" y="0" width="520" height="18" fill="#151515" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#F5F5F5" stroke="#555"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Blanco</text><text x="180" y="12" fill="#fff" text-anchor="middle">9</text><text x="310" y="12" fill="#666" text-anchor="middle">-</text><text x="450" y="12" fill="#666" text-anchor="middle">-</text>
    </g>
    <g transform="translate(0,302)">
      <rect x="20" y="0" width="520" height="18" fill="#1a1a1a" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#DAA520"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Dorado</text><text x="180" y="12" fill="#666" text-anchor="middle">-</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x0.1</text><text x="450" y="12" fill="#aaa" text-anchor="middle">+/- 5%</text>
    </g>
    <g transform="translate(0,320)">
      <rect x="20" y="0" width="520" height="18" fill="#151515" stroke="#333"/><rect x="28" y="4" width="30" height="10" fill="#C0C0C0"/><text x="70" y="12" fill="#ccc" text-anchor="middle">Plateado</text><text x="180" y="12" fill="#666" text-anchor="middle">-</text><text x="310" y="12" fill="#aaa" text-anchor="middle">x0.01</text><text x="450" y="12" fill="#aaa" text-anchor="middle">+/- 10%</text>
    </g>
  </g>

  <text x="280" y="365" fill="#666" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">Banda 1 y 2: digitos | Banda 3: multiplicador | Banda 4: tolerancia</text>
  <text x="280" y="382" fill="#555" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">Lectura: (digito1 digito2) x multiplicador  ohm</text>
</svg>
