<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a0a0a"/>
  <text x="400" y="42" fill="#63b3ff" font-family="Arial,sans-serif" font-size="19" font-weight="bold" text-anchor="middle">Voltaje en el capacitor segun V0 inicial</text>
  <text x="400" y="64" fill="#888" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">V(t) = Vs + (V0 - Vs) * e^(-t/tau)</text>

  <!-- Ejes -->
  <line x1="80" y1="420" x2="720" y2="420" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="420" x2="80" y2="90" stroke="#555" stroke-width="2"/>
  <text x="400" y="465" fill="#888" font-family="Arial,sans-serif" font-size="14" text-anchor="middle">tiempo (t)</text>
  <text x="38" y="255" fill="#888" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90 38 255)">Vc(t)</text>

  <!-- Linea Vs -->
  <line x1="80" y1="130" x2="720" y2="130" stroke="#63b3ff" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.45"/>
  <text x="735" y="135" fill="#63b3ff" font-family="Arial,sans-serif" font-size="13">Vs</text>

  <!-- Curva V0 = 0 (sube hacia Vs) -->
  <path d="M80 380 C200 375 360 220 720 135" stroke="#63b3ff" stroke-width="3" fill="none"/>
  <circle cx="80" cy="380" r="5" fill="#63b3ff"/>
  <text x="95" y="398" fill="#63b3ff" font-family="Arial,sans-serif" font-size="11">V0 = 0</text>

  <!-- Curva V0 &lt; Vs (continua subiendo) -->
  <path d="M80 280 C210 275 380 180 720 135" stroke="#8ecbff" stroke-width="2.5" fill="none" stroke-dasharray="0"/>
  <circle cx="80" cy="280" r="5" fill="#8ecbff"/>
  <text x="95" y="272" fill="#8ecbff" font-family="Arial,sans-serif" font-size="11">V0 &lt; Vs</text>

  <!-- Curva V0 &gt; Vs (baja hacia Vs) -->
  <path d="M80 160 C210 165 380 150 720 135" stroke="#4da6ff" stroke-width="2.5" fill="none"/>
  <circle cx="80" cy="160" r="5" fill="#4da6ff"/>
  <text x="95" y="152" fill="#4da6ff" font-family="Arial,sans-serif" font-size="11">V0 &gt; Vs</text>

  <!-- Leyenda -->
  <rect x="520" y="340" width="180" height="72" rx="8" fill="#151515" stroke="#333"/>
  <text x="610" y="362" fill="#aaa" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Todas tienden a Vs</text>
  <text x="610" y="380" fill="#666" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">La curva depende de V0</text>
  <text x="610" y="398" fill="#666" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">antes de conectar la fuente</text>
</svg>
